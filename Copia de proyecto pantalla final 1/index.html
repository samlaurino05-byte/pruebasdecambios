<html lang="es">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCA Pantalla</title>
<style>
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#000;
    color:#fff;
    overflow:hidden;
    cursor:none;
  }
  .screen{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:linear-gradient(180deg,#060606 0%, #111 100%);
  }
  .header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 24px 14px;
    border-bottom:1px solid rgba(255,255,255,.10);
  }
  .header-left{
    display:flex;
    align-items:center;
    gap:16px;
  }
  .logo{
    width:70px;
    height:70px;
    object-fit:contain;
    background:transparent;
    border-radius:0;
    padding:0;
    display:block;
  }
  .title{
    font-size:30px;
    font-weight:700;
    line-height:1.1;
  }
  .sub{
    color:#aaa;
    font-size:15px;
    margin-top:4px;
  }
  .clock{
    text-align:right;
  }
  .clock-time{
    font-size:22px;
    font-weight:700;
  }
  .clock-sub{
    color:#888;
    font-size:13px;
    margin-top:4px;
  }
  .legend{
    display:flex;
    gap:10px;
    padding:14px 24px 0;
    flex-wrap:wrap;
  }
  .pill{
    padding:8px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:700;
  }
  .eco{background:#f97316;color:#fff}
  .der{background:#7c3aed;color:#fff}
  .sal{background:#3b82f6;color:#fff}
  .qui{background:#facc15;color:#000}
  .content{
    flex:1;
    padding:18px 24px;
    min-height:0;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(4, minmax(0,1fr));
    gap:20px;
    align-items:start;
  }
  .card{
    background:#f3f3f7;
    color:#111;
    border-radius:22px;
    padding:16px;
    min-height:240px;
    height:240px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
    border:1px solid rgba(0,0,0,.04);
  }
  .top{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
  }
  .fac{
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    color:#fff;
    font-weight:700;
    line-height:1.1;
    max-width:140px;
    text-align:center;
  }
  .status{
    color:#fff;
    padding:6px 10px;
    border-radius:20px;
    font-size:12px;
    font-weight:700;
    white-space:nowrap;
  }
  .status.live{background:#10b981}
  .status.soon{background:#9ca3af}
  .card.eco .fac{background:#f97316}
  .card.der .fac{background:#7c3aed}
  .card.sal .fac{background:#3b82f6}
  .card.qui .fac{background:#facc15;color:#000}
  .card.eco h2{color:#f97316}
  .card.der h2{color:#7c3aed}
  .card.sal h2{color:#3b82f6}
  .card.qui h2{color:#d4a200}
  h2{
    font-size:18px;
    line-height:1.15;
    margin:0;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .info{
    font-size:14px;
    display:flex;
    flex-direction:column;
    gap:9px;
  }
  .info-line{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .icon-wrap{
    width:18px;
    height:18px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex:0 0 18px;
  }
  .icon-svg{
    width:16px;
    height:16px;
    stroke:currentColor;
    fill:none;
    stroke-width:1.9;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .card.eco .icon-wrap{color:#f97316}
  .card.der .icon-wrap{color:#7c3aed}
  .card.sal .icon-wrap{color:#3b82f6}
  .card.qui .icon-wrap{color:#d4a200}
  .footer{
    display:flex;
    justify-content:space-between;
    padding:14px 24px;
    color:#888;
    border-top:1px solid rgba(255,255,255,.1);
    font-size:15px;
  }
  .empty{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .empty-box{
    border:1px solid rgba(255,255,255,.12);

    border-radius:28px;
    padding:42px;
    text-align:center;
    width:min(980px,100%);
  }
  .empty-box h2{font-size:36px;color:#fff}
  .empty-box p{color:#bdbdbd;font-size:18px;margin-top:12px}
</style>

function parseRange(range){
  const [start, end] = range.split(' a ');
  const [sh, sm] = start.replace('.', ':').split(':').map(Number);
  const [eh, em] = end.replace('.', ':').split(':').map(Number);
  return { start: sh*60 + sm, end: eh*60 + em };
}

function getNowContext(){
  if(TEST_MODE){
    const hours = Math.floor(TEST_TIME/60).toString().padStart(2,'0');
    const mins = (TEST_TIME%60).toString().padStart(2,'0');
    return {
      day: TEST_DAY,
      minutes: TEST_TIME,
      label: `${TEST_DAY}, ${hours}:${mins}`
    };
  }

  const now = new Date();
  const day = now.toLocaleDateString('es-AR', { weekday:'long' }).toLowerCase();
  const minutes = now.getHours()*60 + now.getMinutes();
  const label = now.toLocaleString('es-AR', { weekday:'long', hour:'2-digit', minute:'2-digit' });
  return { day, minutes, label };
}

function chunk(arr,size){
  const out=[];
  for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size));
  return out;
}

function getVisible(){
  const ctx = getNowContext();
  subtitle.textContent = `${ctx.day.charAt(0).toUpperCase()+ctx.day.slice(1)} · Materias próximas y en curso`;
  clockEl.textContent = ctx.label;

  return data
    .filter(item => item.dia === ctx.day)
    .map(item => {
      const slot = parseRange(item.horario);
      const live = ctx.minutes >= slot.start && ctx.minutes < slot.end;
      const soon = ctx.minutes >= slot.start - 15 && ctx.minutes < slot.start;
      return { ...item, live, soon, slotStart:slot.start };
    })
    .filter(item => item.live || item.soon)
    .sort((a,b) => {
      const order = facultyOrder.indexOf(a.facultad) - facultyOrder.indexOf(b.facultad);
      if(order !== 0) return order;
      return a.slotStart - b.slotStart;
    });
}

        <div class="info-line">${locationIcon}<span>${item.aula}</span></div>
        <div class="info-line">${groupIcon}<span>${item.comision}</span></div>
        <div class="info-line">${timeIcon}<span>${item.horario}</span></div>
      </div>
    </div>`;
}

function render(){
  const visible = getVisible();
  pages = chunk(visible, 8);
  if(page >= pages.length) page = 0;

  if(!visible.length){
    content.innerHTML = `<div class="empty"><div class="empty-box"><h2>En este momento no hay materias en curso</h2><p>La pantalla muestra materias 15 minutos antes de su inicio y durante su cursado real.</p></div></div>`;
  } else {
    const current = pages[page] || [];
    content.innerHTML = `<div class="grid">${current.map(createCard).join('')}</div>`;
  }

  footerCount.textContent = `${visible.length} materias en este momento`;
}

render();
setInterval(render, 30000);
setInterval(() => {
  location.reload();
}, 1000 * 60 * 10);
setInterval(() => {
  if(pages.length > 1){
    page = (page + 1) % pages.length;
    render();
  }
}, rotationMs);
document.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  }
});
</script>
</body>
</html>
